<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Career Compass AI — Find your path after 10th</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Sora:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#12142A;
  --bg-deep:#0C0E1F;
  --surface:#1B1E3D;
  --surface2:#242A57;
  --surface3:#2C3168;
  --accent:#E8A33D;
  --accent-dim:#C98B2C;
  --accent2:#3ECFB2;
  --accent2-dim:#2FA88A;
  --danger:#E1657A;
  --text:#F3F1EA;
  --muted:#9B9FC7;
  --muted-dim:#6C709C;
  --line:rgba(243,241,234,0.10);
  --line-strong:rgba(243,241,234,0.18);
  --radius:18px;
  --radius-sm:10px;
  --shadow:0 20px 60px -20px rgba(0,0,0,0.6);
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  margin:0;
  background:
    radial-gradient(1200px 600px at 85% -10%, rgba(232,163,61,0.10), transparent 60%),
    radial-gradient(900px 500px at -10% 20%, rgba(62,207,178,0.08), transparent 60%),
    var(--bg);
  color:var(--text);
  font-family:'Sora', sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
::selection{ background:var(--accent); color:var(--bg-deep); }
h1,h2,h3,h4{ font-family:'Fraunces', serif; margin:0; letter-spacing:-0.01em; }
p{ margin:0; }
a{ color:inherit; }
button{ font-family:inherit; cursor:pointer; }
.mono{ font-family:'IBM Plex Mono', monospace; }
.container{ max-width:1180px; margin:0 auto; padding:0 28px; }
@media (max-width:640px){ .container{ padding:0 18px; } }

/* ---------- Compass mark (signature element) ---------- */
.compass-mark{ width:34px; height:34px; flex:none; }
.compass-mark .needle{ transform-origin:50% 50%; transition:transform 1.1s cubic-bezier(.16,1,.3,1); }

/* ---------- Top nav ---------- */
.topnav{
  position:sticky; top:0; z-index:50;
  background:rgba(18,20,42,0.86);
  backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);
}
.topnav-inner{ display:flex; align-items:center; gap:22px; height:72px; }
.brand{ display:flex; align-items:center; gap:10px; font-family:'Fraunces',serif; font-size:19px; font-weight:600; white-space:nowrap; }
.brand small{ display:block; font-family:'Sora',sans-serif; font-weight:400; font-size:10.5px; color:var(--muted); letter-spacing:0.08em; text-transform:uppercase; }
.navscroll{ display:flex; gap:4px; overflow-x:auto; scrollbar-width:none; flex:1; }
.navscroll::-webkit-scrollbar{ display:none; }
.navlink{
  background:none; border:none; color:var(--muted); font-size:13.5px; font-weight:500;
  padding:9px 13px; border-radius:100px; white-space:nowrap; transition:all .18s ease;
}
.navlink:hover{ color:var(--text); background:var(--surface); }
.navlink.active{ color:var(--bg-deep); background:var(--accent); }

/* ---------- Layout helpers ---------- */
.section{ padding:64px 0 78px; }
.section.tight{ padding:40px 0 60px; }
.eyebrow{ font-family:'IBM Plex Mono',monospace; font-size:11.5px; letter-spacing:0.14em; text-transform:uppercase; color:var(--accent2); margin-bottom:14px; display:flex; align-items:center; gap:8px; }
.eyebrow::before{ content:''; width:16px; height:1px; background:var(--accent2); }
.section-head{ max-width:680px; margin-bottom:40px; }
.section-head h2{ font-size:clamp(28px,4vw,40px); font-weight:600; line-height:1.15; }
.section-head p{ color:var(--muted); font-size:15.5px; margin-top:12px; line-height:1.6; }

.card{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); }
.grid{ display:grid; gap:18px; }
.grid-2{ grid-template-columns:repeat(2,1fr); }
.grid-3{ grid-template-columns:repeat(3,1fr); }
.grid-4{ grid-template-columns:repeat(4,1fr); }
@media (max-width:920px){ .grid-3,.grid-4{ grid-template-columns:repeat(2,1fr); } }
@media (max-width:620px){ .grid-2,.grid-3,.grid-4{ grid-template-columns:1fr; } }

.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  padding:13px 24px; border-radius:100px; border:1px solid transparent;
  font-size:14px; font-weight:600; transition:all .18s ease; text-decoration:none;
}
.btn-primary{ background:var(--accent); color:#241705; }
.btn-primary:hover{ background:#f0ae4d; transform:translateY(-1px); }
.btn-ghost{ background:transparent; border-color:var(--line-strong); color:var(--text); }
.btn-ghost:hover{ border-color:var(--accent2); color:var(--accent2); }
.btn-sm{ padding:8px 16px; font-size:12.5px; }
.btn:disabled{ opacity:0.4; cursor:not-allowed; }
.pill{ display:inline-flex; align-items:center; gap:6px; padding:5px 12px; border-radius:100px; background:var(--surface2); font-size:12px; color:var(--muted); border:1px solid var(--line); }
.tag{ font-family:'IBM Plex Mono',monospace; font-size:11px; padding:3px 9px; border-radius:6px; background:var(--surface3); color:var(--accent2); }

/* ---------- Hero ---------- */
.hero{ padding:70px 0 40px; position:relative; overflow:hidden; }
.hero-grid{ display:grid; grid-template-columns:1.15fr 0.85fr; gap:50px; align-items:center; }
@media (max-width:920px){ .hero-grid{ grid-template-columns:1fr; } }
.hero h1{ font-size:clamp(36px,5.2vw,58px); line-height:1.06; font-weight:600; }
.hero h1 em{ font-style:italic; color:var(--accent); font-weight:500; }
.hero p.lead{ color:var(--muted); font-size:17px; line-height:1.65; margin-top:20px; max-width:520px; }
.hero-cta{ display:flex; gap:14px; margin-top:32px; flex-wrap:wrap; }
.hero-stats{ display:flex; gap:32px; margin-top:44px; flex-wrap:wrap; }
.hero-stat b{ font-family:'Fraunces',serif; font-size:26px; display:block; color:var(--accent); }
.hero-stat span{ font-size:12.5px; color:var(--muted); }

.compass-hero{ position:relative; aspect-ratio:1/1; max-width:400px; margin:0 auto; }

.stream-strip{ display:flex; gap:14px; overflow-x:auto; padding:6px 2px 16px; margin-top:10px; }
.stream-chip{ flex:none; width:168px; background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:16px; transition:.2s; }
.stream-chip:hover{ border-color:var(--accent2); transform:translateY(-3px); }
.stream-chip .ic{ font-size:22px; }
.stream-chip h4{ font-size:14.5px; margin-top:10px; }
.stream-chip p{ font-size:11.5px; color:var(--muted); margin-top:6px; line-height:1.4; }

/* ---------- Assessment ---------- */
.progress-wrap{ display:flex; align-items:center; gap:16px; margin-bottom:30px; }
.progress-track{ flex:1; height:6px; border-radius:100px; background:var(--surface2); overflow:hidden; }
.progress-fill{ height:100%; background:linear-gradient(90deg,var(--accent2),var(--accent)); transition:width .35s ease; }
.q-card{ padding:38px; }
.q-index{ font-family:'IBM Plex Mono',monospace; color:var(--accent2); font-size:12.5px; margin-bottom:14px; }
.q-text{ font-size:22px; font-weight:500; font-family:'Fraunces',serif; line-height:1.4; margin-bottom:30px; }
.likert{ display:flex; gap:10px; flex-wrap:wrap; }
.likert button{ flex:1; min-width:90px; padding:14px 8px; border-radius:12px; border:1px solid var(--line-strong); background:var(--surface2); color:var(--muted); font-size:12.5px; font-weight:600; text-align:center; transition:.15s; }
.likert button:hover{ border-color:var(--accent2); color:var(--text); }
.likert button.picked{ background:var(--accent2); border-color:var(--accent2); color:#092620; }
.q-nav{ display:flex; justify-content:space-between; margin-top:30px; align-items:center; }
.q-dots{ display:flex; gap:5px; flex-wrap:wrap; max-width:340px; }
.q-dot{ width:7px; height:7px; border-radius:100px; background:var(--surface3); }
.q-dot.done{ background:var(--accent2); }
.q-dot.current{ background:var(--accent); width:16px; }

/* ---------- Results ---------- */
.result-hero{ background:linear-gradient(155deg,var(--surface2),var(--surface)); padding:40px; position:relative; overflow:hidden; }
.score-ring{ width:132px; height:132px; flex:none; }
.result-top{ display:flex; gap:30px; align-items:center; flex-wrap:wrap; }
.holland-row{ display:flex; gap:8px; margin-top:18px; flex-wrap:wrap; }
.holland-badge{ width:40px; height:40px; border-radius:100px; display:flex; align-items:center; justify-content:center; font-family:'Fraunces',serif; font-weight:600; font-size:16px; background:var(--surface3); color:var(--muted); border:2px solid transparent; }
.holland-badge.top{ border-color:var(--accent); color:var(--accent); background:rgba(232,163,61,0.12); }

.rank-row{ display:flex; align-items:center; gap:14px; padding:14px 0; border-bottom:1px solid var(--line); }
.rank-row:last-child{ border-bottom:none; }
.rank-bar-track{ flex:1; height:8px; border-radius:100px; background:var(--surface2); overflow:hidden; }
.rank-bar-fill{ height:100%; border-radius:100px; background:var(--muted-dim); }
.rank-row.top .rank-bar-fill{ background:linear-gradient(90deg,var(--accent2),var(--accent)); }

.detail-grid{ display:grid; grid-template-columns:1fr 1fr; gap:24px; margin-top:26px; }
@media (max-width:760px){ .detail-grid{ grid-template-columns:1fr; } }
.detail-box h4{ font-size:13px; text-transform:uppercase; letter-spacing:0.06em; color:var(--accent2); margin-bottom:12px; font-family:'IBM Plex Mono',monospace; font-weight:500; }
.chip-list{ display:flex; flex-wrap:wrap; gap:8px; }
.chip{ padding:7px 13px; border-radius:100px; background:var(--surface2); font-size:12.5px; border:1px solid var(--line); }
ul.plain{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:9px; }
ul.plain li{ font-size:13.5px; color:var(--muted); padding-left:18px; position:relative; line-height:1.5; }
ul.plain li::before{ content:'—'; position:absolute; left:0; color:var(--accent2); }

/* radar */
.radar-wrap{ display:flex; gap:28px; flex-wrap:wrap; align-items:center; }
.radar-legend{ display:flex; flex-direction:column; gap:8px; font-size:12.5px; }
.radar-legend .row{ display:flex; justify-content:space-between; gap:20px; min-width:220px; }
.radar-legend .row span:first-child{ color:var(--muted); }
.radar-legend .row span:last-child{ font-family:'IBM Plex Mono',monospace; color:var(--accent); }

/* ---------- Career explorer ---------- */
.career-card{ padding:22px; display:flex; flex-direction:column; gap:12px; cursor:pointer; transition:.2s; }
.career-card:hover{ border-color:var(--accent2); transform:translateY(-3px); }
.career-card h3{ font-size:17px; }
.career-card .meta{ display:flex; gap:8px; flex-wrap:wrap; }
.career-card p.desc{ color:var(--muted); font-size:13px; line-height:1.55; }
.bookmark-btn{ margin-left:auto; background:none; border:none; color:var(--muted); font-size:17px; }
.bookmark-btn.on{ color:var(--accent); }
.filter-row{ display:flex; gap:10px; flex-wrap:wrap; margin-bottom:26px; }
.filter-chip{ padding:8px 15px; border-radius:100px; background:var(--surface); border:1px solid var(--line); font-size:12.5px; color:var(--muted); }
.filter-chip.active{ background:var(--accent2); color:#062420; border-color:var(--accent2); }

/* modal */
.modal-back{ position:fixed; inset:0; background:rgba(6,7,18,0.72); backdrop-filter:blur(4px); z-index:100; display:flex; align-items:center; justify-content:center; padding:20px; }
.modal{ background:var(--surface); border:1px solid var(--line-strong); border-radius:22px; max-width:640px; width:100%; max-height:86vh; overflow-y:auto; padding:36px; position:relative; }
.modal-close{ position:absolute; top:20px; right:20px; background:var(--surface2); border:none; color:var(--text); width:34px; height:34px; border-radius:100px; font-size:16px; }

/* ---------- Streams accordion ---------- */
.acc-item{ border:1px solid var(--line); border-radius:16px; margin-bottom:12px; overflow:hidden; background:var(--surface); }
.acc-head{ display:flex; align-items:center; justify-content:space-between; padding:20px 24px; background:none; border:none; width:100%; text-align:left; color:var(--text); }
.acc-head h3{ font-size:17px; }
.acc-head .sub{ font-size:12.5px; color:var(--muted); margin-top:4px; font-weight:400; font-family:'Sora',sans-serif; }
.acc-chevron{ transition:transform .25s ease; color:var(--accent2); font-size:18px; }
.acc-item.open .acc-chevron{ transform:rotate(45deg); }
.acc-body{ max-height:0; overflow:hidden; transition:max-height .3s ease; }
.acc-item.open .acc-body{ max-height:900px; }
.acc-body-inner{ padding:0 24px 26px; display:grid; grid-template-columns:1fr 1fr; gap:22px; }
@media (max-width:700px){ .acc-body-inner{ grid-template-columns:1fr; } }

/* ---------- College finder ---------- */
.college-row{ display:grid; grid-template-columns:1.6fr 1fr 0.8fr 0.8fr 0.7fr; gap:14px; align-items:center; padding:16px 22px; border-bottom:1px solid var(--line); font-size:13.5px; }
.college-row.head{ color:var(--muted); font-family:'IBM Plex Mono',monospace; font-size:11px; text-transform:uppercase; letter-spacing:0.05em; }
@media (max-width:800px){ .college-row{ grid-template-columns:1fr; gap:4px; padding:16px; } .college-row.head{ display:none; } }

/* ---------- Roadmaps ---------- */
.roadmap-tabs{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:30px; }
.trail{ position:relative; padding-left:34px; }
.trail::before{ content:''; position:absolute; left:9px; top:6px; bottom:6px; width:2px; background:repeating-linear-gradient(to bottom, var(--accent2) 0 6px, transparent 6px 12px); }
.trail-node{ position:relative; margin-bottom:26px; }
.trail-node::before{ content:''; position:absolute; left:-34px; top:2px; width:20px; height:20px; border-radius:100px; background:var(--bg); border:3px solid var(--accent2); }
.trail-node.final::before{ background:var(--accent); border-color:var(--accent); }
.trail-node h4{ font-size:15.5px; }
.trail-node p{ color:var(--muted); font-size:12.5px; margin-top:4px; }

/* ---------- Scholarships / blogs ---------- */
.res-card{ padding:22px; }
.res-card .tag{ margin-bottom:12px; display:inline-block; }
.res-card h3{ font-size:16px; margin-bottom:8px; }
.res-card p{ color:var(--muted); font-size:13px; line-height:1.55; }
.res-card .footline{ margin-top:14px; display:flex; justify-content:space-between; align-items:center; font-size:12px; color:var(--muted-dim); }

/* ---------- Chatbot ---------- */
.chat-shell{ display:grid; grid-template-columns:280px 1fr; gap:0; border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; height:560px; }
@media (max-width:760px){ .chat-shell{ grid-template-columns:1fr; height:auto; } }
.chat-side{ background:var(--surface2); padding:22px; border-right:1px solid var(--line); overflow-y:auto; }
.chat-side h4{ font-size:12px; text-transform:uppercase; letter-spacing:0.06em; color:var(--muted); margin-bottom:14px; font-family:'IBM Plex Mono',monospace; }
.chat-suggest{ display:block; width:100%; text-align:left; background:none; border:1px solid var(--line); color:var(--muted); padding:10px 12px; border-radius:10px; font-size:12.5px; margin-bottom:8px; line-height:1.4; }
.chat-suggest:hover{ border-color:var(--accent2); color:var(--text); }
.chat-main{ display:flex; flex-direction:column; background:var(--bg-deep); }
.chat-log{ flex:1; overflow-y:auto; padding:24px; display:flex; flex-direction:column; gap:14px; }
.msg{ max-width:78%; padding:13px 16px; border-radius:16px; font-size:13.5px; line-height:1.55; }
.msg.bot{ background:var(--surface); align-self:flex-start; border-bottom-left-radius:4px; }
.msg.user{ background:var(--accent2); color:#052420; align-self:flex-end; border-bottom-right-radius:4px; font-weight:500; }
.chat-input-row{ display:flex; gap:10px; padding:16px; border-top:1px solid var(--line); }
.chat-input-row input{ flex:1; background:var(--surface); border:1px solid var(--line-strong); border-radius:100px; padding:12px 18px; color:var(--text); font-size:13.5px; }
.chat-input-row input:focus{ outline:none; border-color:var(--accent2); }

/* ---------- Dashboard ---------- */
.dash-stat{ padding:24px; }
.dash-stat .big{ font-family:'Fraunces',serif; font-size:32px; color:var(--accent); }
.dash-stat .lbl{ font-size:12.5px; color:var(--muted); margin-top:6px; }
.empty-state{ text-align:center; padding:50px 20px; color:var(--muted); }
.empty-state .ic{ font-size:34px; margin-bottom:14px; }

/* ---------- Contact ---------- */
.form-row{ display:flex; flex-direction:column; gap:8px; margin-bottom:18px; }
.form-row label{ font-size:12.5px; color:var(--muted); font-family:'IBM Plex Mono',monospace; }
.form-row input, .form-row textarea, .form-row select{ background:var(--surface2); border:1px solid var(--line-strong); border-radius:10px; padding:13px 15px; color:var(--text); font-size:14px; font-family:inherit; }
.form-row input:focus, .form-row textarea:focus, .form-row select:focus{ outline:none; border-color:var(--accent2); }
.form-row textarea{ resize:vertical; min-height:110px; }

/* ---------- Footer ---------- */
footer{ border-top:1px solid var(--line); padding:40px 0; margin-top:40px; }
.foot-row{ display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px; }
.foot-links{ display:flex; gap:20px; font-size:13px; color:var(--muted); }

/* ---------- toast ---------- */
#toast{ position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(120%); background:var(--accent2); color:#052420; padding:13px 22px; border-radius:100px; font-size:13.5px; font-weight:600; z-index:200; transition:transform .3s cubic-bezier(.16,1,.3,1); box-shadow:var(--shadow); }
#toast.show{ transform:translateX(-50%) translateY(0); }

/* dark/light toggle */
body.light{
  --bg:#F6F4EE; --bg-deep:#EFEBE0; --surface:#FFFFFF; --surface2:#F1EEE4; --surface3:#E7E2D3;
  --text:#211E14; --muted:#6B6656; --muted-dim:#9A947F; --line:rgba(33,30,20,0.10); --line-strong:rgba(33,30,20,0.18);
}
body.light .msg.bot{ background:#EFEBE0; }
.mode-toggle{ background:var(--surface2); border:1px solid var(--line-strong); border-radius:100px; width:42px; height:42px; display:flex; align-items:center; justify-content:center; font-size:17px; flex:none; }

.hide{ display:none !important; }
</style>
</head>
<body>

<nav class="topnav">
  <div class="container topnav-inner">
    <div class="brand">
      <svg class="compass-mark" viewBox="0 0 40 40"><circle cx="20" cy="20" r="18" fill="none" stroke="var(--accent2)" stroke-width="1.5"/><g class="needle" id="navNeedle"><polygon points="20,7 23,20 20,33 17,20" fill="var(--accent)"/></g><circle cx="20" cy="20" r="2.5" fill="var(--text)"/></svg>
      <div>Career Compass AI<small>Guidance after 10th grade</small></div>
    </div>
    <div class="navscroll" id="navScroll"></div>
    <button class="mode-toggle" id="modeToggle" title="Toggle dark/light">🌙</button>
  </div>
</nav>

<main id="app"></main>

<footer>
  <div class="container foot-row">
    <div class="brand" style="font-size:15px;">
      <svg class="compass-mark" style="width:24px;height:24px" viewBox="0 0 40 40"><circle cx="20" cy="20" r="18" fill="none" stroke="var(--accent2)" stroke-width="1.5"/><polygon points="20,7 23,20 20,33 17,20" fill="var(--accent)"/></svg>
      Career Compass AI
    </div>
    <div class="foot-links">
      <span>Built for students &amp; parents</span>
      <span>·</span>
      <span>Every recommendation is explainable, not a black box</span>
    </div>
  </div>
</footer>

<div id="toast"></div>

<script>
/* =========================================================
   DATA LAYER
   ========================================================= */

const SECTIONS = [
  {id:'home', label:'Home'},
  {id:'assessment', label:'Career Assessment'},
  {id:'results', label:'AI Recommendation'},
  {id:'skills', label:'Skill Analyzer'},
  {id:'explorer', label:'Career Explorer'},
  {id:'streams', label:'Streams Guide'},
  {id:'colleges', label:'College Finder'},
  {id:'roadmaps', label:'Roadmaps'},
  {id:'scholarships', label:'Scholarships'},
  {id:'blog', label:'Blogs & Resources'},
  {id:'chatbot', label:'AI Chatbot'},
  {id:'dashboard', label:'Dashboard'},
  {id:'contact', label:'Contact'},
];

// 20 trait dimensions scored 0-100 from the assessment
const TRAIT_LABELS = {
  logical:'Logical Reasoning', numerical:'Numerical Ability', communication:'Communication',
  creativity:'Creativity', scientific:'Scientific Thinking', biology:'Biology Interest',
  tech:'Technology Interest', business:'Business Interest', design:'Design Sense',
  helping:'Helping People', practical:'Practical / Hands-on', teamwork:'Teamwork',
  leadership:'Leadership', risk:'Risk Appetite', patience:'Patience', detail:'Attention to Detail',
  stress:'Stress Handling', outdoor:'Outdoor Preference', emotional:'Emotional Intelligence',
  observation:'Observation'
};

// 30 assessment questions. tags: trait -> weight
const QUESTIONS = [
  {id:1, text:"I enjoy solving mathematical problems and puzzles.", tags:{logical:1, numerical:1}},
  {id:2, text:"I like understanding how machines, gadgets or software work.", tags:{tech:1}},
  {id:3, text:"I'm fascinated by how the human body and living things function.", tags:{biology:1, scientific:1}},
  {id:4, text:"I enjoy leading a group project and assigning tasks to others.", tags:{leadership:1}},

const CHAT_SUGGESTIONS = ["What stream suits me?","Can I become a Data Scientist without MPC?","What are the best careers after BiPC?","Which skills should I learn now?","How do I become a lawyer?","Show me scholarship options"];

/* =========================================================
   STATE  (in-memory only for this session — no browser storage)
   ========================================================= */
const STATE = {
  section:'home',
  theme:'dark',
  answers:{},              // qId -> 1..5
  qIndex:0,
  traitScores:null,        // computed once assessment completes
  streamRanking:null,      // sorted array of {stream, score}
  bookmarks:new Set(),
  chatHistory:[],
  explorerFilter:'All',
  activeRoadmap:'AI Engineer',
  openAccordion:null,
};

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  clearTimeout(window.__toastT);
  window.__toastT=setTimeout(()=>t.classList.remove('show'), 2200);
}

function clamp(n,a,b){ return Math.max(a,Math.min(b,n)); }

function computeTraitScores(){
  const sums={}, counts={};
  Object.keys(TRAIT_LABELS).forEach(t=>{sums[t]=0;counts[t]=0;});
  QUESTIONS.forEach(q=>{
    const val=STATE.answers[q.id];
    if(val==null) return;
    Object.keys(q.tags).forEach(trait=>{
      sums[trait]+= (val-1)/4*100;
      counts[trait]+=1;
    });
  });
  const scores={};
  Object.keys(TRAIT_LABELS).forEach(t=>{
    scores[t] = counts[t] ? Math.round(sums[t]/counts[t]) : 50;
  });
  return scores;
}

function computeHolland(scores){
  const R = (scores.practical + scores.outdoor + scores.tech)/3;
  const I = (scores.logical + scores.scientific + scores.numerical)/3;
  const A = (scores.creativity + scores.design)/2;
  const S = (scores.helping + scores.communication + scores.teamwork + scores.emotional)/4;
  const E = (scores.leadership + scores.business + scores.risk)/3;
  const C = (scores.detail + scores.patience)/2;
  return {R:Math.round(R), I:Math.round(I), A:Math.round(A), S:Math.round(S), E:Math.round(E), C:Math.round(C)};
}

function computeStreamRanking(scores){
  const rows = Object.values(STREAMS).map(s=>{
    let score=0;
    Object.entries(s.weights).forEach(([trait,w])=>{ score += w * scores[trait]; });
    return {stream:s, score:Math.round(score)};
  });
  rows.sort((a,b)=>b.score-a.score);
  return rows;
}

function answeredCount(){ return Object.keys(STATE.answers).length; }
function assessmentComplete(){ return answeredCount() === QUESTIONS.length; }

function finalizeAssessment(){
  STATE.traitScores = computeTraitScores();
  STATE.streamRanking = computeStreamRanking(STATE.traitScores);
}

/* =========================================================
   NAV + ROUTER
   ========================================================= */
function renderNav(){
  const nav=document.getElementById('navScroll');
  nav.innerHTML = SECTIONS.map(s=>
    `<button class="navlink ${STATE.section===s.id?'active':''}" data-goto="${s.id}">${s.label}</button>`
  ).join('');
}

function goto(id){
  STATE.section=id;
  window.scrollTo({top:0, behavior:'smooth'});
  render();
}

function render(){
  renderNav();
  const app=document.getElementById('app');
  const fns={
    home:renderHome, assessment:renderAssessment, results:renderResults, skills:renderSkills,
    explorer:renderExplorer, streams:renderStreams, colleges:renderColleges, roadmaps:renderRoadmaps,
    scholarships:renderScholarships, blog:renderBlog, chatbot:renderChatbot, dashboard:renderDashboard, contact:renderContact
  };
  app.innerHTML = fns[STATE.section] ? fns[STATE.section]() : '';
  afterRender();
  // rotate the nav compass needle to reflect progress through the app
  const idx = SECTIONS.findIndex(s=>s.id===STATE.section);
  const deg = Math.round((idx/(SECTIONS.length-1))*340);
  const needle=document.getElementById('navNeedle');
  if(needle) needle.style.transform=`rotate(${deg}deg)`;
}

function afterRender(){
  // hero needle animate-in
  const heroNeedle=document.getElementById('heroNeedle');
  if(heroNeedle){
    heroNeedle.style.transform='rotate(-40deg)';
    heroNeedle.style.transition='transform 1.4s cubic-bezier(.16,1,.3,1)';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{ heroNeedle.style.transform='rotate(28deg)'; }));
  }

  // assessment: likert answer
  document.querySelectorAll('.likert button').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const qid = Number(btn.closest('.likert').dataset.qid);
      STATE.answers[qid] = Number(btn.dataset.val);
      render();
    });
  });
  const nextQ=document.getElementById('nextQ');
  if(nextQ) nextQ.addEventListener('click', ()=>{
    if(STATE.qIndex < QUESTIONS.length-1){ STATE.qIndex++; render(); }
    else { finalizeAssessment(); STATE.__reviewing=false; render(); }
  });
  const prevQ=document.getElementById('prevQ');
  if(prevQ) prevQ.addEventListener('click', ()=>{ if(STATE.qIndex>0){ STATE.qIndex--; render(); } });
  const retakeBtn=document.getElementById('retakeBtn');
  if(retakeBtn) retakeBtn.addEventListener('click', ()=>{ STATE.__reviewing=true; STATE.qIndex=0; render(); });

  // explorer filters
  document.querySelectorAll('[data-explorer-filter]').forEach(btn=>{
    btn.addEventListener('click', ()=>{ STATE.explorerFilter=btn.dataset.explorerFilter; render(); });
  });
  document.querySelectorAll('[data-career-open]').forEach(card=>{
    card.addEventListener('click', (e)=>{
      if(e.target.closest('[data-bookmark]')) return;
      document.body.insertAdjacentHTML('beforeend', careerModal(card.dataset.careerOpen));
      bindModal();
    });
  });
  document.querySelectorAll('[data-bookmark]').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      e.stopPropagation();
      const id=btn.dataset.bookmark;
      if(STATE.bookmarks.has(id)){ STATE.bookmarks.delete(id); toast('Removed bookmark'); }
      else { STATE.bookmarks.add(id); toast('Career bookmarked'); }
      render();
      const backdrop=document.getElementById('careerModalBack');
      if(backdrop) backdrop.remove();
    });
  });

  // streams accordion
  document.querySelectorAll('[data-acc-toggle]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id=btn.dataset.accToggle;
      STATE.openAccordion = STATE.openAccordion===id ? null : id;
      render();
    });
  });

  // college filters
  document.querySelectorAll('[data-college-course]').forEach(btn=>{
    btn.addEventListener('click', ()=>{ STATE.collegeFilters=STATE.collegeFilters||{course:'All',type:'All'}; STATE.collegeFilters.course=btn.dataset.collegeCourse; render(); });
  });
  document.querySelectorAll('[data-college-type]').forEach(btn=>{
    btn.addEventListener('click', ()=>{ STATE.collegeFilters=STATE.collegeFilters||{course:'All',type:'All'}; STATE.collegeFilters.type=btn.dataset.collegeType; render(); });
  });

  // roadmap tabs
  document.querySelectorAll('[data-roadmap]').forEach(btn=>{
    btn.addEventListener('click', ()=>{ STATE.activeRoadmap=btn.dataset.roadmap; render(); });
  });

  // chatbot
  const chatSend=document.getElementById('chatSend');
  const chatInput=document.getElementById('chatInput');
  function sendChat(){
    const val=chatInput.value.trim();
    if(!val) return;
    STATE.chatHistory.push({who:'user', text:val});
    STATE.chatHistory.push({who:'bot', text:chatReply(val)});
    chatInput.value='';
    render();
    const log=document.getElementById('chatLog');
    if(log) log.scrollTop=log.scrollHeight;
  }
  if(chatSend) chatSend.addEventListener('click', sendChat);
  if(chatInput) chatInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter') sendChat(); });
  document.querySelectorAll('[data-chat-suggest]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      STATE.chatHistory.push({who:'user', text:btn.dataset.chatSuggest});
      STATE.chatHistory.push({who:'bot', text:chatReply(btn.dataset.chatSuggest)});
      render();
    });
  });
  const chatLog=document.getElementById('chatLog');
  if(chatLog) chatLog.scrollTop=chatLog.scrollHeight;

  // contact form
  const contactForm=document.getElementById('contactForm');
  if(contactForm) contactForm.addEventListener('submit', (e)=>{
    e.preventDefault();
    toast('Message sent — we will get back to you soon.');
    contactForm.reset();
  });
}

function bindModal(){
  const back=document.getElementById('careerModalBack');
  const close=document.getElementById('closeModal');
  if(close) close.addEventListener('click', ()=>back.remove());
  if(back) back.addEventListener('click', (e)=>{ if(e.target===back) back.remove(); });
  document.querySelectorAll('#careerModalBack [data-bookmark]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id=btn.dataset.bookmark;
      if(STATE.bookmarks.has(id)){ STATE.bookmarks.delete(id); toast('Removed bookmark'); }
      else { STATE.bookmarks.add(id); toast('Career bookmarked'); }
      back.remove();
      render();
    });
  });
  document.querySelectorAll('#careerModalBack [data-goto]').forEach(btn=>{
    btn.addEventListener('click', ()=>{ back.remove(); goto(btn.dataset.goto); });
  });
}

document.addEventListener('click', (e)=>{
  const nb = e.target.closest('[data-goto]');
  if(nb && !e.target.closest('.modal')){ goto(nb.dataset.goto); return; }
});

/* =========================================================
   SKILL ANALYZER
   ========================================================= */
function renderSkills(){
  if(!assessmentComplete()){
    return emptyState('📊','No aptitude data yet','Complete the Career Assessment so we can chart your aptitude profile and generate a career-specific skill gap.', 'assessment', 'Go to Career Assessment');
  }
  if(!STATE.streamRanking) finalizeAssessment();
  const scores=STATE.traitScores;
  const top=STATE.streamRanking[0].stream;
  const gapCareer = CAREERS.find(c=>c.stream===top.id);
  const gap = gapCareer ? (SKILL_GAPS[gapCareer.id]||DEFAULT_SKILL_GAP) : DEFAULT_SKILL_GAP;

  const radarTraits = ['logical','numerical','communication','creativity','observation','leadership','practical','emotional'];
  const cx=170, cy=170, R=140;
  const n=radarTraits.length;
  const pts = radarTraits.map((t,i)=>{
    const ang = -Math.PI/2 + i*(2*Math.PI/n);
    const r = R * (scores[t]/100);
    return [cx + r*Math.cos(ang), cy + r*Math.sin(ang)];
  });
  const ringPts=(frac)=>radarTraits.map((t,i)=>{
    const ang=-Math.PI/2+i*(2*Math.PI/n);
    return `${cx+R*frac*Math.cos(ang)},${cy+R*frac*Math.sin(ang)}`;
  }).join(' ');
  const polygon = pts.map(p=>p.join(',')).join(' ');
  const labelPts = radarTraits.map((t,i)=>{
    const ang=-Math.PI/2+i*(2*Math.PI/n);
    const r=R+26;
    return {x:cx+r*Math.cos(ang), y:cy+r*Math.sin(ang), t};
  });

  return `
  <section class="section tight">
    <div class="container">
      <div class="section-head">
        <div class="eyebrow">Skill analyzer</div>
        <h2>Your aptitude profile, charted</h2>
        <p>Scores are derived from your assessment responses and shown as percentages, not raw ranks.</p>
      </div>

      <div class="card" style="padding:32px;">
        <div class="radar-wrap">
          <svg width="340" height="340" viewBox="0 0 340 340">
            ${[0.25,0.5,0.75,1].map(f=>`<polygon points="${ringPts(f)}" fill="none" stroke="var(--line-strong)" stroke-width="1"/>`).join('')}
            ${labelPts.map(p=>`<line x1="${cx}" y1="${cy}" x2="${p.x + (p.x>cx?-14:p.x<cx?14:0)}" y2="${p.y + (p.y>cy?-10:p.y<cy?10:0)}" stroke="var(--line)" stroke-width="1"/>`).join('')}
            <polygon points="${polygon}" fill="var(--accent2)" fill-opacity="0.22" stroke="var(--accent2)" stroke-width="2"/>
            ${pts.map(p=>`<circle cx="${p[0]}" cy="${p[1]}" r="3.5" fill="var(--accent)"/>`).join('')}
            ${labelPts.map(p=>`<text x="${p.x}" y="${p.y}" text-anchor="middle" font-size="10.5" fill="var(--muted)" font-family="IBM Plex Mono">${TRAIT_LABELS[p.t].split(' ')[0]}</text>`).join('')}
          </svg>
          <div class="radar-legend">
            ${radarTraits.map(t=>`<div class="row"><span>${TRAIT_LABELS[t]}</span><span>${scores[t]}%</span></div>`).join('')}
          </div>
        </div>
      </div>

      <div class="section-head" style="margin-top:44px;">
        <div class="eyebrow">Skill gap — for ${gapCareer? gapCareer.name : top.name.split('—')[0].trim()}</div>
        <h2>What to build next</h2>
      </div>
      <div class="grid grid-2">
        <div class="card" style="padding:26px;">
          <h4 class="mono" style="font-size:12.5px;color:var(--accent2);margin-bottom:12px;">Current skills</h4>
          <ul class="plain">${gap.current.map(x=>`<li>${x}</li>`).join('')}</ul>
        </div>
        <div class="card" style="padding:26px;">
          <h4 class="mono" style="font-size:12.5px;color:var(--danger);margin-bottom:12px;">Missing skills</h4>
          <ul class="plain">${gap.missing.map(x=>`<li>${x}</li>`).join('')}</ul>
        </div>
        <div class="card" style="padding:26px;">
          <h4 class="mono" style="font-size:12.5px;color:var(--accent2);margin-bottom:12px;">Learning resources</h4>
          <ul class="plain">${gap.resources.map(x=>`<li>${x}</li>`).join('')}</ul>
        </div>
        <div class="card" style="padding:26px;">
          <h4 class="mono" style="font-size:12.5px;color:var(--accent2);margin-bottom:12px;">Suggested projects</h4>
          <ul class="plain">${gap.projects.map(x=>`<li>${x}</li>`).join('')}</ul>
        </div>
      </div>
      <div class="card" style="padding:22px 26px;margin-top:18px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;">
        <span style="font-size:13.5px;color:var(--muted);">Estimated learning timeline</span>
        <span class="pill mono">${gap.timeline}</span>
      </div>
    </div>
  </section>`;
}

/* =========================================================
   CAREER EXPLORER
   ========================================================= */
function renderExplorer(){
  const filter = STATE.explorerFilter;
  const list = filter==='All' ? CAREERS : CAREERS.filter(c=>c.category===filter);
  return `
  <section class="section tight">
    <div class="container">
      <div class="section-head">
        <div class="eyebrow">Career explorer</div>
        <h2>${CAREERS.length}+ careers, explained plainly</h2>
        <p>Each card covers the core skills, typical education path, indicative salary and demand outlook. Bookmark any career to revisit it from your Dashboard.</p>
      </div>
      <div class="filter-row">
        ${CAREER_CATEGORIES.map(c=>`<button class="filter-chip ${c===filter?'active':''}" data-explorer-filter="${c}">${c}</button>`).join('')}
      </div>
      <div class="grid grid-3">
        ${list.map(c=>`
          <div class="card career-card" data-career-open="${c.id}">
            <div style="display:flex;align-items:center;gap:8px;">
              <span class="tag">${c.category}</span>
              <button class="bookmark-btn ${STATE.bookmarks.has(c.id)?'on':''}" data-bookmark="${c.id}">${STATE.bookmarks.has(c.id)?'★':'☆'}</button>
            </div>
            <h3>${c.name}</h3>
            <p class="desc">${c.desc}</p>
            <div class="meta">
              <span class="pill">${c.demand} demand</span>
              <span class="pill mono">${c.salary}</span>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  </section>`;
}

function careerModal(id){
  const c=CAREERS.find(x=>x.id===id);
  if(!c) return '';
  return `
  <div class="modal-back" id="careerModalBack">
    <div class="modal">
      <button class="modal-close" id="closeModal">✕</button>
      <span class="tag">${c.category}</span>
      <h2 style="font-size:24px;margin-top:14px;">${c.name}</h2>
      <p style="color:var(--muted);font-size:14px;margin-top:10px;line-height:1.6;">${c.desc}</p>
      <div class="grid grid-2" style="margin-top:22px;">
        <div class="detail-box">
          <h4>Key skills</h4>
          <div class="chip-list">${c.skills.map(s=>`<span class="chip">${s}</span>`).join('')}</div>
        </div>
        <div class="detail-box">
          <h4>Typical education</h4>
          <p style="font-size:13.5px;color:var(--muted);">${c.edu}</p>
        </div>
        <div class="detail-box">
          <h4>Indicative salary (India)</h4>
          <p style="font-size:13.5px;color:var(--muted);">${c.salary}</p>
        </div>
        <div class="detail-box">
          <h4>Demand outlook</h4>
          <p style="font-size:13.5px;color:var(--muted);">${c.demand}</p>
        </div>
      </div>
      <div style="margin-top:24px;display:flex;gap:12px;flex-wrap:wrap;">
        <button class="btn btn-primary btn-sm" data-bookmark="${c.id}">${STATE.bookmarks.has(c.id)?'★ Bookmarked':'☆ Bookmark this career'}</button>
        <button class="btn btn-ghost btn-sm" data-goto="streams">See full stream: ${STREAMS[c.stream].name.split('—')[0].trim()}</button>

function emptyState(icon, title, body, gotoId, cta){
  return `<section class="section">
    <div class="container">
      <div class="card empty-state">
        <div class="ic">${icon}</div>
        <h3 style="font-size:20px;margin-bottom:10px;">${title}</h3>
        <p style="max-width:440px;margin:0 auto 22px;font-size:14px;">${body}</p>
        <button class="btn btn-primary" data-goto="${gotoId}">${cta}</button>
      </div>
    </div>

}

/* =========================================================
   STREAMS GUIDE
   ========================================================= */
function renderStreams(){
  return `
  <section class="section tight">
    <div class="container">
      <div class="section-head">
        <div class="eyebrow">Educational streams guide</div>
        <h2>Every pathway after 10th, in one place</h2>
        <p>Click a pathway to see subjects, suitable careers, required skills, entrance exams and colleges to shortlist.</p>
      </div>
      ${Object.values(STREAMS).map(s=>`
        <div class="acc-item ${STATE.openAccordion===s.id?'open':''}" data-acc="${s.id}">
          <button class="acc-head" data-acc-toggle="${s.id}">
            <div><h3>${s.icon}&nbsp; ${s.name}</h3><div class="sub">${s.subjects.join(' · ')}</div></div>
            <span class="acc-chevron">+</span>
          </button>
          <div class="acc-body">
            <div class="acc-body-inner">
              <div class="detail-box">
                <h4>Suitable for</h4>
                <p style="font-size:13.5px;color:var(--muted);line-height:1.6;">${s.suitableFor}</p>
                <h4 style="margin-top:18px;">Required skills</h4>
                <div class="chip-list">${s.skills.map(x=>`<span class="chip">${x}</span>`).join('')}</div>
              </div>
              <div class="detail-box">
                <h4>Career options</h4>
                <div class="chip-list">${s.careers.map(x=>`<span class="chip">${x}</span>`).join('')}</div>
                <h4 style="margin-top:18px;">Entrance exams</h4>
                <ul class="plain">${s.exams.map(x=>`<li>${x}</li>`).join('')}</ul>
              </div>
            </div>
          </div>
        </div>
      `).join('')}
    </div>
  </section>`;
}

/* =========================================================
   COLLEGE FINDER
   ========================================================= */
function renderColleges(){
  const state=STATE.collegeFilters||{course:'All', type:'All'};
  STATE.collegeFilters=state;
  const courses=['All', ...new Set(COLLEGES.map(c=>c.course))];
  const types=['All','Government','Government-aided','Private','Private/Autonomous'];
  let list=COLLEGES;
  if(state.course!=='All') list=list.filter(c=>c.course===state.course);
  if(state.type!=='All') list=list.filter(c=>c.type===state.type);

  return `
  <section class="section tight">
    <div class="container">
      <div class="section-head">
        <div class="eyebrow">College finder</div>
        <h2>Shortlist by course, fees and ownership</h2>
        <p>A sample national dataset to help you compare options at a glance — always confirm current fees and cut-offs on the official college website.</p>
      </div>
      <div class="filter-row">
        <span class="pill mono" style="background:none;border:none;padding-left:0;">Course:</span>
        ${courses.map(c=>`<button class="filter-chip ${state.course===c?'active':''}" data-college-course="${c}">${c}</button>`).join('')}
      </div>
      <div class="filter-row">
        <span class="pill mono" style="background:none;border:none;padding-left:0;">Type:</span>
        ${types.map(t=>`<button class="filter-chip ${state.type===t?'active':''}" data-college-type="${t}">${t}</button>`).join('')}
      </div>
      <div class="card" style="overflow:hidden;">
        <div class="college-row head"><span>College</span><span>Course</span><span>Fees</span><span>Type</span><span>Placements</span></div>
        ${list.map(c=>`
          <div class="college-row">
            <span><b>${c.name}</b><br><span style="color:var(--muted-dim);font-size:12px;">${c.state} · ${c.ranking}</span></span>
            <span>${c.course}</span>
            <span class="mono">${c.fees}</span>
            <span>${c.type}</span>
            <span>${c.placements}</span>
          </div>
        `).join('') || `<div style="padding:30px;text-align:center;color:var(--muted);">No colleges match these filters.</div>`}
      </div>
    </div>
  </section>`;
}

/* =========================================================
   ROADMAPS
   ========================================================= */
function renderRoadmaps(){
  const active=STATE.activeRoadmap;
  const steps=ROADMAPS[active];
  return `
  <section class="section tight">
    <div class="container">
      <div class="section-head">
        <div class="eyebrow">Learning roadmaps</div>
        <h2>From 10th grade to the job title</h2>
        <p>A visual, step-by-step trail — pick a career to see the realistic sequence of decisions ahead.</p>
      </div>
      <div class="roadmap-tabs">
        ${Object.keys(ROADMAPS).map(k=>`<button class="filter-chip ${k===active?'active':''}" data-roadmap="${k}">${k}</button>`).join('')}
      </div>
      <div class="card" style="padding:36px;">
        <div class="trail">
          ${steps.map((s,i)=>`
            <div class="trail-node ${i===steps.length-1?'final':''}">
              <h4>${s}</h4>
              <p>${i===0?'Starting point':i===steps.length-1?'Destination career':'Waypoint '+i}</p>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  </section>`;
}

/* =========================================================
   SCHOLARSHIPS
   ========================================================= */
function renderScholarships(){
  return `
  <section class="section tight">
    <div class="container">
      <div class="section-head">
        <div class="eyebrow">Scholarships</div>

          </div>

}

/* =========================================================
   BLOG & RESOURCES
   ========================================================= */
function renderBlog(){
  return `
  <section class="section tight">
    <div class="container">
      <div class="section-head">
        <div class="eyebrow">Blogs &amp; resources</div>
        <h2>Reading for the in-between moments</h2>
        <p>Short, practical reads — not motivational filler.</p>
      </div>
      <div class="grid grid-3">
        ${BLOGS.map(b=>`
          <div class="card res-card">
            <span class="tag">${b.tag}</span>
            <h3>${b.title}</h3>
            <p>${b.blurb}</p>
            <div class="footline"><span>${b.read}</span><span>📖</span></div>
          </div>
        `).join('')}
      </div>
    </div>
  </section>`;
}

/* =========================================================
   AI CHATBOT
   ========================================================= */
function chatReply(userText){
  const low = userText.toLowerCase();
  for(const item of CHAT_KB){
    if(item.kw.some(k=>low.includes(k))) return item.a;
  }
  return "I'm not fully sure about that one yet — but here's what I can help with: stream selection, careers after a specific stream, skills to build, entrance exams, scholarships, colleges, or a step-by-step roadmap. Or take the full Career Assessment for a personalised answer.";
}

function renderChatbot(){
  if(STATE.chatHistory.length===0){
    STATE.chatHistory.push({who:'bot', text:"Hi! I'm the Career Compass assistant. Ask me anything about streams, careers, skills or exams — or tap a suggestion to get started."});
  }
  return `
  <section class="section tight">
    <div class="container">
      <div class="section-head">
        <div class="eyebrow">AI career chatbot</div>
        <h2>Ask in plain language</h2>
        <p>Rule-based answers tuned for common questions students ask after Class 10. For a fully personalised result, take the Career Assessment instead.</p>
      </div>
      <div class="chat-shell">
        <div class="chat-side">
          <h4>Try asking</h4>
          ${CHAT_SUGGESTIONS.map(s=>`<button class="chat-suggest" data-chat-suggest="${s.replace(/"/g,'&quot;')}">${s}</button>`).join('')}
        </div>
        <div class="chat-main">
          <div class="chat-log" id="chatLog">
            ${STATE.chatHistory.map(m=>`<div class="msg ${m.who}">${m.text}</div>`).join('')}
          </div>
          <div class="chat-input-row">
            <input type="text" id="chatInput" placeholder="Type your question…" />
            <button class="btn btn-primary btn-sm" id="chatSend">Send</button>
          </div>
        </div>
      </div>
    </div>
  </section>`;
}

/* =========================================================
   STUDENT DASHBOARD
   ========================================================= */
function renderDashboard(){
  const done = assessmentComplete();
  const pct = Math.round((answeredCount()/QUESTIONS.length)*100);
  const top = done ? (STATE.streamRanking ? STATE.streamRanking[0] : (finalizeAssessment(), STATE.streamRanking[0])) : null;
  const bookmarked = CAREERS.filter(c=>STATE.bookmarks.has(c.id));

  return `
  <section class="section tight">
    <div class="container">
      <div class="section-head">
        <div class="eyebrow">Student dashboard</div>
        <h2>Everything you've done this session</h2>
        <p>Saved in your browser session only — nothing is uploaded or shared.</p>
      </div>
      <div class="grid grid-4">
        <div class="card dash-stat"><div class="big">${pct}%</div><div class="lbl">Assessment progress</div></div>
        <div class="card dash-stat"><div class="big">${done?top.score+'%':'—'}</div><div class="lbl">Top pathway match</div></div>
        <div class="card dash-stat"><div class="big">${bookmarked.length}</div><div class="lbl">Careers bookmarked</div></div>
        <div class="card dash-stat"><div class="big">${STATE.chatHistory.filter(m=>m.who==='user').length}</div><div class="lbl">Chatbot questions asked</div></div>
      </div>

      <div class="grid grid-2" style="margin-top:22px;">
        <div class="card" style="padding:26px;">
          <h4 class="mono" style="font-size:12.5px;color:var(--accent2);margin-bottom:14px;">Career report</h4>
          ${done ? `
            <p style="font-size:14px;">Top recommendation: <b>${top.stream.name.split('—')[0].trim()}</b> (${top.score}% match)</p>
            <button class="btn btn-ghost btn-sm" style="margin-top:14px;" data-goto="results">Open full report →</button>
          ` : `<p style="color:var(--muted);font-size:13.5px;">No report yet.</p><button class="btn btn-ghost btn-sm" style="margin-top:14px;" data-goto="assessment">Start assessment →</button>`}
        </div>
        <div class="card" style="padding:26px;">
          <h4 class="mono" style="font-size:12.5px;color:var(--accent2);margin-bottom:14px;">Bookmarked careers</h4>
          ${bookmarked.length ? `<div class="chip-list">${bookmarked.map(c=>`<span class="chip">${c.name}</span>`).join('')}</div>` : `<p style="color:var(--muted);font-size:13.5px;">Bookmark careers from the Career Explorer to see them here.</p>`}
        </div>
      </div>
    </div>
  </section>`;
}

/* =========================================================
   CONTACT
   ========================================================= */
function renderContact(){
  return `
  <section class="section tight">
    <div class="container">
      <div class="section-head">
        <div class="eyebrow">Contact</div>
        <h2>Questions, feedback, partnerships</h2>
        <p>This demo form doesn't send anywhere yet — wire it up to your backend of choice when you're ready to go live.</p>
      </div>
      <div class="card" style="padding:34px;max-width:560px;">
        <form id="contactForm">
          <div class="form-row"><label>Name</label><input type="text" required placeholder="Your full name"/></div>
          <div class="form-row"><label>Email</label><input type="email" required placeholder="you@example.com"/></div>
          <div class="form-row"><label>I am a</label>
            <select><option>Student</option><option>Parent</option><option>School / Counsellor</option><option>Other</option></select>

          <div class="form-row"><label>Message</label><textarea required placeholder="How can we help?"></textarea></div>
          <button class="btn btn-primary" type="submit">Send message</button>
        </form>
      </div>
    </div>

}

/* =========================================================
   HOME
   ========================================================= */
function renderHome(){
  const pct = Math.round((answeredCount()/QUESTIONS.length)*100);
  return `
  <section class="hero">
    <div class="container hero-grid">
      <div>
        <div class="eyebrow">For students after Class 10</div>
        <h1>Find the path that actually fits <em>you</em> — not your neighbour's rank list.</h1>
        <p class="lead">Career Compass AI reads your interests, personality and aptitude, then explains — in plain language — which stream, skills and roadmap suit you best. No black-box scores. Every recommendation shows its working.</p>
        <div class="hero-cta">
          <button class="btn btn-primary" data-goto="assessment">Start Career Assessment →</button>
          <button class="btn btn-ghost" data-goto="chatbot">Ask the AI Chatbot</button>
        </div>
        <div class="hero-stats">
          <div class="hero-stat"><b>9</b><span>Educational pathways covered</span></div>
          <div class="hero-stat"><b>${CAREERS.length}+</b><span>Careers explored in depth</span></div>
          <div class="hero-stat"><b>30</b><span>Assessment questions</span></div>
          <div class="hero-stat"><b>${pct}%</b><span>Your assessment progress</span></div>
        </div>
      </div>
      <div class="compass-hero">
        <svg viewBox="0 0 400 400" width="100%" height="100%">
          <circle cx="200" cy="200" r="188" fill="none" stroke="var(--line-strong)" stroke-width="1"/>
          <circle cx="200" cy="200" r="150" fill="none" stroke="var(--line)" stroke-width="1" stroke-dasharray="2 6"/>
          <circle cx="200" cy="200" r="110" fill="none" stroke="var(--line)" stroke-width="1"/>
          ${['N','E','S','W'].map((d,i)=>{
            const ang=i*90, rad=ang*Math.PI/180, x=200+170*Math.sin(rad), y=200-170*Math.cos(rad);
            return `<text x="${x}" y="${y}" text-anchor="middle" fill="var(--muted)" font-family="IBM Plex Mono" font-size="13">${d}</text>`;
          }).join('')}
          <g style="transform-origin:200px 200px" id="heroNeedle">
            <polygon points="200,60 218,200 200,340 182,200" fill="var(--accent)" opacity="0.9"/>
            <polygon points="200,60 218,200 200,200 182,200" fill="var(--accent2)" opacity="0.9"/>
          </g>
          <circle cx="200" cy="200" r="10" fill="var(--text)"/>
        </svg>
      </div>
    </div>
    <div class="container">
      <p class="eyebrow" style="margin-top:10px;">Educational pathways</p>
      <div class="stream-strip">
        ${Object.values(STREAMS).map(s=>`
          <div class="stream-chip">
            <div class="ic">${s.icon}</div>
            <h4>${s.name.split('—')[0].trim()}</h4>
            <p>${s.subjects.slice(0,3).join(', ')}</p>
          </div>`).join('')}
      </div>
    </div>
  </section>

  <section class="section tight">
    <div class="container">
      <div class="section-head">
        <div class="eyebrow">How it works</div>
        <h2>Three honest steps, not one guess</h2>
        <p>Career Compass never assigns a stream at random. It builds a trait profile from your answers, scores every pathway against that profile, and always shows the reasoning.</p>
      </div>
      <div class="grid grid-3">
        <div class="card" style="padding:26px;">
          <div class="tag">Step 1</div>
          <h3 style="margin-top:14px;font-size:18px;">Answer honestly</h3>
          <p style="color:var(--muted);font-size:13.5px;margin-top:10px;line-height:1.6;">30 short questions on interests, personality and aptitude. Takes about 8 minutes, and you can leave and come back within the session.</p>
        </div>
        <div class="card" style="padding:26px;">
          <div class="tag">Step 2</div>
          <h3 style="margin-top:14px;font-size:18px;">See the full ranking</h3>
          <p style="color:var(--muted);font-size:13.5px;margin-top:10px;line-height:1.6;">Every one of the 9 pathways gets a transparent score — including why the lower-ranked ones scored lower.</p>
        </div>
        <div class="card" style="padding:26px;">
          <div class="tag">Step 3</div>
          <h3 style="margin-top:14px;font-size:18px;">Get a real roadmap</h3>
          <p style="color:var(--muted);font-size:13.5px;margin-top:10px;line-height:1.6;">Skill gaps, certifications, entrance exams, colleges and a step-by-step path from today to the job title.</p>
        </div>
      </div>
    </div>
  </section>
  `;
}
</script>
